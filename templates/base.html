<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}StockPulse{% endblock %}</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="/static/js/common.js"></script>
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">StockPulse</a>
      <div class="nav-links">
        <a href="/" {% if request.path == '/' %}class="active"{% endif %}>홈</a>
        <a href="/us" {% if request.path == '/us' %}class="active"{% endif %}>미국주식</a>
        <a href="/kr" {% if request.path == '/kr' %}class="active"{% endif %}>한국주식</a>
        <a href="/compare" {% if request.path == '/compare' %}class="active"{% endif %}>종목비교</a>
        <a href="/advanced" {% if request.path == '/advanced' %}class="active"{% endif %}>고급분석</a>
        <a href="/guide" {% if request.path == '/guide' %}class="active"{% endif %}>도움말</a>
        <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>
      </div>
    </div>
  </nav>

  {% block content %}{% endblock %}

  <footer class="footer">
    <p>StockPulse &mdash; 기술지표 기반 주식 분석 도구</p>
    <p style="margin-top:4px;">투자 판단의 참고 자료로만 활용하세요. 투자 책임은 본인에게 있습니다.</p>
  </footer>
</body>
</html>
